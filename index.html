<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #youTubePlayer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* All overlay blocks: pointer-events none so taps still reach the iframe */

        /* Top bar: video title + channel name */
        .overlay-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* Bottom bar: progress bar + controls */
        .overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* YouTube watermark logo — bottom LEFT corner */
        .overlay-logo-bottom-left {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 150px;
            height: 50px;
            background: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* YouTube watermark logo — bottom RIGHT corner */
        .overlay-logo-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 150px;
            height: 50px;
            background: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* Top-right area: settings / fullscreen button */
        .overlay-top-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 60px;
            background: #000;
            z-index: 10;
            pointer-events: none;
        }

        /* Center large play button (shows on pause) */
        .overlay-center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: transparent; /* Keep transparent so video shows */
            z-index: 10;
            pointer-events: none;
        }

        /* End screen / suggested videos (covers full player) */
        .overlay-endscreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: transparent;
            z-index: 9;
            pointer-events: none;
            display: none; /* Only shown on video end */
        }

        .overlay-endscreen.visible {
            display: block;
            background: #000;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api" async></script>
</head>
<body>
    <div id="player-container">
        <div id="youTubePlayer"></div>

        <!-- Overlays that hide YouTube UI while keeping video visible -->
        <div class="overlay-top"></div>
        <div class="overlay-bottom"></div>
        <div class="overlay-logo-bottom-left"></div>
        <div class="overlay-logo-bottom-right"></div>
        <div class="overlay-top-right"></div>
        <div class="overlay-endscreen" id="endscreen-overlay"></div>
    </div>

    <script>
        const q = new URLSearchParams(location.search);
        const videoId = q.get("videoId") || "";
        const startAt = parseFloat(q.get("start") || "0");

        const STATES = {
            [-1]: "UNSTARTED",
            0: "ENDED",
            1: "PLAYING",
            2: "PAUSED",
            3: "BUFFERING",
            5: "CUED",
        };

        let player, timer;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player("youTubePlayer", {
                width: "100%",
                height: "100%",
                playerVars: {
                    autoplay: 1,
                    controls: 0,        // hides bottom control bar entirely
                    cc_load_policy: 0,
                    fs: 0,              // disable fullscreen (we handle it)
                    iv_load_policy: 3,  // hide annotations
                    rel: 0,
                    enablejsapi: 1,
                    mute: 1,
                    playsinline: 1,
                    origin: location.origin,
                    modestbranding: 1,
                    disablekb: 1,
                    showinfo: 0,
                },
                events: {
                    onReady: () => {
                        document.title = "ytplayer://onReady";
                        if (videoId) loadVideo(videoId, startAt);
                    },
                    onStateChange: (e) => stateChanged(e.data),
                    onError: (e) =>
                        (document.title = "ytplayer://onError?data=" + e.data),
                },
            });
        }

        function stateChanged(s) {
            clearInterval(timer);
            document.title = "ytplayer://onStateChange?data=" + (STATES[s] || "");

            // Show black overlay on video end to hide YouTube's suggested videos
            const endscreen = document.getElementById('endscreen-overlay');
            if (s === 0) {
                endscreen.classList.add('visible');
            } else {
                endscreen.classList.remove('visible');
            }

            if (s === 1) {
                timer = setInterval(() => {
                    try {
                        document.title =
                            "ytplayer://onCurrentTimeChange?data=" +
                            player.getCurrentTime();
                    } catch (e) {}
                }, 200);
                try {
                    const d = player.getDuration();
                    if (d > 0)
                        document.title = "ytplayer://onVideoDuration?data=" + d;
                } catch (e) {}
            }
        }

        function loadVideo(id, sec) {
            // Hide endscreen when new video loads
            document.getElementById('endscreen-overlay').classList.remove('visible');
            if (player && player.loadVideoById) {
                player.loadVideoById(id, sec || 0);
                document.title = "ytplayer://onVideoId?data=" + id;
            }
        }

        function playVideo() {
            if (player && player.playVideo) player.playVideo();
        }

        function pauseVideo() {
            if (player && player.pauseVideo) player.pauseVideo();
        }

        function seekTo(s) {
            if (player && player.seekTo) player.seekTo(s, true);
        }

        function mute() {
            if (player && player.mute) player.mute();
        }

        function unMute() {
            if (player && player.unMute) player.unMute();
        }

        function setVolume(volumePercent) {}

        function setPlaybackRate(r) {
            if (player && player.setPlaybackRate) player.setPlaybackRate(r);
        }
    </script>
</body>
</html>
