<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        position: fixed;
        inset: 0;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
        background: #000;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none;
      }

      /* black flash remover */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }

      #loadingOverlay.hidden {
        opacity: 0;
      }

      /* blocks taps so UI never reappears */
      #touchShield {
        position: fixed;
        inset: 0;
        z-index: 9998;
        background: transparent;
      }
    </style>

    <script src="https://www.youtube.com/iframe_api"></script>
  </head>

  <body>
    <div id="app"></div>
    <div id="loadingOverlay"></div>
    <div id="touchShield"></div>

    <script>
      (function () {
        const VIDEO_ID = "_VOdGlyXYqw";

        let player;
        let loadingHidden = false;

        const loading = document.getElementById("loadingOverlay");

        function hideLoading() {
          if (loadingHidden) return;
          loadingHidden = true;
          loading.classList.add("hidden");
        }

        function createPlayer() {
          const div = document.createElement("div");
          div.id = "player";
          document.getElementById("app").appendChild(div);

          player = new YT.Player("player", {
            videoId: VIDEO_ID,

            playerVars: {
              autoplay: 1,
              controls: 0,
              rel: 0,
              fs: 0,
              disablekb: 1,
              iv_load_policy: 3,
              playsinline: 1,
              mute: 1,
            },

            events: {
              onReady: (e) => {
                e.target.playVideo();
                setTimeout(hideLoading, 150);
              },



              onStateChange: (e) => {
                // loop video
                if (e.data === YT.PlayerState.ENDED) {
                  player.playVideo();
                }

                // only act ON FIRST PLAY
                if (e.data === YT.PlayerState.PLAYING) {
                  hideLoading();
                }

                // IMPORTANT:
                // DO NOT handle PAUSED anymore
                // (this is what causes title UI to reappear)
              },

            },

          });
        }
        setInterval(() => {
  const state = player?.getPlayerState?.();
  if (state === YT.PlayerState.PAUSED) {
    player.playVideo();
  }
}, 500);

        window.onYouTubeIframeAPIReady = createPlayer;
      })();
    </script>
  </body>
</html>
