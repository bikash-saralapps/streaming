<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<style>
*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    height: 100vh;
    overflow: hidden;
    background: #000;
    position: fixed;
    top: 0;
    left: 0;
    overscroll-behavior: none;
}

#clip {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
    background: #000;
}

#player {
    position: absolute;
    top: -58px;
    left: 0;
    width: 100%;
    height: calc(100% + 58px);
    height: calc(100vh + 58px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

.loading-bg {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    transition: opacity 0.28s ease;
    pointer-events: none;
}

.loading-bg.hide {
    opacity: 0;
    pointer-events: none;
}

.touch-block {
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: transparent;
    pointer-events: auto;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>
<div class="loading-bg" id="loading"></div>

<div id="clip">
    <div id="player"></div>
</div>

<div class="touch-block" id="touchBlock"></div>

<script>
(function() {
    let player;
    let loadingHidden = false;
    const LOADING_ID = 'loading';

    function hideLoading() {
        if (loadingHidden) return;
        loadingHidden = true;
        const el = document.getElementById(LOADING_ID);
        if (el) el.classList.add('hide');
    }

    const maxLoadingTimer = setTimeout(hideLoading, 4000);

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('player', {
            videoId: '_VOdGlyXYqw',
            playerVars: {
                autoplay: 1,
                controls: 0,
                modestbranding: 1,
                rel: 0,
                fs: 0,
                disablekb: 1,
                iv_load_policy: 3,
                playsinline: 1,
                mute: 1,
                showinfo: 0,
                enablejsapi: 1,
                origin: window.location.origin,
                widgetid: 1
            },
            events: {
                onReady: function(event) {
                    event.target.playVideo();
                    setTimeout(hideLoading, 180);
                },
                onStateChange: function(event) {
                    if (event.data === YT.PlayerState.ENDED) {
                        player.playVideo();
                    }

                    if (event.data === YT.PlayerState.PAUSED) {
                        setTimeout(() => {
                            if (player.getPlayerState() === YT.PlayerState.PAUSED) {
                                player.playVideo();
                            }
                        }, 60);
                    }

                    if (event.data === YT.PlayerState.PLAYING) {
                        hideLoading();
                        clearTimeout(maxLoadingTimer);
                    }
                },
                onError: function() {
                    hideLoading();
                    clearTimeout(maxLoadingTimer);
                }
            }
        });
    };

    window.addEventListener('load', function() {
        setTimeout(function() {
            if (!loadingHidden) {
                hideLoading();
                clearTimeout(maxLoadingTimer);
            }
        }, 2500);
    });
})();
</script>
</body>
</html>
