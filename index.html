<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  background: #000;
  overflow: hidden;
}

#youTubePlayer {
  width: 100%;
  height: 100%;
}

/* 🔥 ultra-fast overlay (blocks ALL title flash) */
#overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.15s ease;
}

#overlay.hide {
  opacity: 0;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>

<div id="youTubePlayer"></div>
<div id="overlay"></div>

<script>
const q = new URLSearchParams(location.search);
const videoId = q.get("videoId") || "";
const startAt = parseFloat(q.get("start") || "0");

const STATES = {
  [-1]: "UNSTARTED",
  0: "ENDED",
  1: "PLAYING",
  2: "PAUSED",
  3: "BUFFERING",
  5: "CUED",
};

let player;
let overlay = document.getElementById("overlay");
let started = false;

function hideOverlayFast() {
  overlay.classList.add("hide");
  setTimeout(() => {
    overlay.style.display = "none";
  }, 150);
}

window.onYouTubeIframeAPIReady = function () {
  player = new YT.Player("youTubePlayer", {
    width: "100%",
    height: "100%",
    playerVars: {
      autoplay: 1,
      controls: 0,
      rel: 0,
      fs: 1,
      iv_load_policy: 3,
      playsinline: 1,
      mute: 1,
      disablekb: 1,
      modestbranding: 1
    },

    events: {
      onReady: () => {
        document.title = "ytplayer://onReady";
        if (videoId) loadVideo(videoId, startAt);

        // 🔥 INSTANT autoplay attempts
        tryPlay();
        setTimeout(tryPlay, 150);
        setTimeout(tryPlay, 500);
      },

      onStateChange: (e) => stateChanged(e.data),

      onError: (e) =>
        document.title = "ytplayer://onError?data=" + e.data
    }
  });

  // 🔥 hidden tap fallback (guaranteed mobile unlock)
  document.body.addEventListener("touchstart", tryPlay, { once: true });
};

function tryPlay() {
  if (!player || started) return;

  try {
    player.mute();
    player.playVideo();
    started = true;
    hideOverlayFast(); // 🔥 fastest possible title removal
  } catch (e) {}
}

function stateChanged(s) {
  document.title = "ytplayer://onStateChange?data=" + (STATES[s] || "");

  // 🔥 PLAYING → instantly hide overlay again (kills title flash)
  if (s === 1) {
    hideOverlayFast();

    setInterval(() => {
      try {
        document.title =
          "ytplayer://onCurrentTimeChange?data=" +
          player.getCurrentTime();
      } catch (e) {}
    }, 300);
  }

  // 🔥 LOOP VIDEO
  if (s === 0) {
    player.playVideo();
  }

  // 🔥 IMPORTANT FIX:
  // If PAUSED → instantly resume (prevents title UI reappearing)
  if (s === 2) {
    hideOverlayFast(); // keep screen black during state switch

    setTimeout(() => {
      try {
        player.playVideo();
      } catch (e) {}
    }, 80);
  }
}

function loadVideo(id, sec) {
  if (player && player.loadVideoById) {
    player.loadVideoById(id, sec || 0);
  }
}
</script>

</body>
</html>
