<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #player {
        width: 100%;
        height: 100%;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none;
      }

      /* fake loading bg */
      .loading-bg {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 999;
        transition: opacity 0.4s ease;
      }

      .loading-bg.hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script src="https://www.youtube.com/iframe_api"></script>
  </head>

  <body>
    <div class="loading-bg" id="loading"></div>

    <div id="player"></div>

    <script>
      let player;

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          videoId: "_VOdGlyXYqw",

          playerVars: {
            autoplay: 1,
            controls: 0,
            modestbranding: 1,
            rel: 0,
            showinfo: 0,
            fs: 0,
            disablekb: 1,
            iv_load_policy: 3,
            playsinline: 1,
            mute: 1,
          },

          events: {
            onReady: function (event) {
              event.target.playVideo();

              // remove black flash fast
              setTimeout(() => {
                document
                  .getElementById("loading")
                  .classList.add("hide");
              }, 300);

              // try unmute after user interaction
              document.body.addEventListener(
                "click",
                () => {
                  player.unMute();
                  player.setVolume(100);
                },
                { once: true }
              );
            },

            onStateChange: function (event) {
              // keeps video looping
              if (event.data === YT.PlayerState.ENDED) {
                player.playVideo();
              }
            },
          },
        });
      }
    </script>
  </body>
</html>
